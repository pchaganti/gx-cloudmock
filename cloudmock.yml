# cloudmock configuration
# All values shown are defaults. Uncomment and modify as needed.

# AWS region to emulate
region: us-east-1

# AWS account ID to emulate
account_id: "000000000000"

# Service profile: minimal | standard | full | custom
# - minimal:  iam, sts, s3, dynamodb, sqs, sns, lambda, cloudwatch-logs
# - standard: all minimal services + rds, cloudformation, ec2, ecr, ecs,
#             secretsmanager, ssm, kinesis, firehose, events, stepfunctions, apigateway
# - full:     all supported services
# - custom:   only services listed under the `services` key below
profile: minimal

iam:
  # IAM enforcement mode: enforce | authenticate | none
  # - enforce:     full IAM policy evaluation (default)
  # - authenticate: verify credentials only, skip policy checks
  # - none:         skip all auth checks (development only)
  mode: enforce
  root_access_key: test
  root_secret_key: test
  # seed_file: /path/to/iam-seed.json

# IaC project directory — auto-provisions DynamoDB tables, Lambda functions,
# Cognito pools, SQS queues, S3 buckets, and topology from your Pulumi/Terraform source.
# Also set via: CLOUDMOCK_IAC_DIR env var or --iac flag
# iac_dir: /path/to/your/pulumi/project

persistence:
  # Set to true to persist state across restarts
  enabled: false
  # path: /var/lib/cloudmock/data

gateway:
  # Main AWS API endpoint port (matches LocalStack default)
  port: 4566

dashboard:
  # Web dashboard for inspecting state
  enabled: true
  port: 4500

admin:
  # Admin/control-plane API port
  port: 4599

logging:
  # Log level: debug | info | warn | error
  level: info
  # Log format: text | json
  format: text

slo:
  # SLO tracking — configurable latency and error rate thresholds
  enabled: true
  rules:
    # Default: all services
    - service: "*"
      action: "*"
      p50_ms: 50
      p95_ms: 200
      p99_ms: 500
      error_rate: 0.01  # 1% error budget
    # Tighter thresholds for DynamoDB
    - service: dynamodb
      action: "*"
      p50_ms: 10
      p95_ms: 50
      p99_ms: 100
      error_rate: 0.001
    # Lambda invocations
    - service: lambda
      action: Invoke
      p50_ms: 100
      p95_ms: 500
      p99_ms: 1000
      error_rate: 0.01

# Per-service overrides (used when profile: custom, or to override defaults)
# services:
#   s3:
#     enabled: true
#     port: 4572
#   lambda:
#     enabled: true
#     runtimes:
#       - nodejs20.x
#       - python3.12

# Project-specific identifier prefixes. Stripped from topology node labels and
# used to recognize caller-service IDs in User-Agent / X-Cloudmock-Source.
# service_prefixes:
#   - mycorp-
#   - mycorp_

# TypeScript class names whose `new <Class>(...)` invocations in your Pulumi
# project denote a Lambda-backed microservice. Empty by default — set this if
# you have a custom Pulumi component that wraps Lambda + API routes.
# iac_microservice_classes:
#   - MyCorpLambdaModuleResource
